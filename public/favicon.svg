<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="body" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#FFE566"/>
      <stop offset="55%"  stop-color="#F5A800"/>
      <stop offset="100%" stop-color="#B86800"/>
    </radialGradient>
    <radialGradient id="shine" cx="32%" cy="26%" r="28%">
      <stop offset="0%"   stop-color="#FFFACC" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#FFFACC" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- stem: short, centered, slight angle -->
  <path d="M16 10 Q16.5 6.5 18.5 5.5" stroke="#6B3A10" stroke-width="1.4" stroke-linecap="round" fill="none"/>

  <!-- leaf -->
  <path d="M16.5 8 Q20.5 5.5 21.5 8.5 Q19 9.5 16.5 8Z" fill="#3A8A2A"/>

  <!-- apple body: round like Granny Smith -->
  <path d="
    M 12.5 10.5
    C 8.5 11.5, 6 15.5, 6 19.5
    C 6 24.5, 10.5 28.5, 16 28.5
    C 21.5 28.5, 26 24.5, 26 19.5
    C 26 15.5, 23.5 11.5, 19.5 10.5
    C 18 10, 17 10.2, 16 10.8
    C 15 10.2, 14 10, 12.5 10.5Z
  " fill="url(#body)"/>

  <!-- top indent shadow -->
  <path d="
    M 13 10.5
    C 14.5 9.5, 15.5 10, 16 10.8
    C 16.5 10, 17.5 9.5, 19 10.5
    C 17.5 11.8, 16.5 12, 16 12
    C 15.5 12, 14.5 11.8, 13 10.5Z
  " fill="#8B4800" opacity="0.45"/>

  <!-- shine -->
  <path d="
    M 12.5 10.5
    C 8.5 11.5, 6 15.5, 6 19.5
    C 6 24.5, 10.5 28.5, 16 28.5
    C 21.5 28.5, 26 24.5, 26 19.5
    C 26 15.5, 23.5 11.5, 19.5 10.5
    C 18 10, 17 10.2, 16 10.8
    C 15 10.2, 14 10, 12.5 10.5Z
  " fill="url(#shine)"/>
</svg>
