      <stop offset="0%"   stop-color="#FFE566"/>
      <stop offset="55%"  stop-color="#F5A800"/>
      <stop offset="100%" stop-color="#B86800"/>
    </radialGradient>
    <radialGradient id="shine" cx="32%" cy="26%" r="28%">
